name: Semgrep Scan

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    semgrep:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Run Semgrep
              uses: returntocorp/semgrep-action@v1
              with:
                config: >
                    p/python
                    p/javascript
                    p/owasp-top-ten