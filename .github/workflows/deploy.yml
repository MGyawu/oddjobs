name: Deploy

on:
    workflow_run:
        workflows: ["Tests", "Semgrep Scan", "Trivy Scan"]
        types: [completed]
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        if: ${{github.event.workflow_run.conclusion == 'success'}}

        steps:
            - name: Verify all workflows passed
              id: gate
              uses: actions/github-script@v7
              with:
                script: |
                    const sha = context.payload.workflow_run.head_sha;
                    const required = ['Tests', 'Semgrep Scan', 'Trivy Scan'];

                    const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRunsForRepo({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        head_sha: sha,
                        status: 'completed'
                    });

                    for (const name of required) {
                        const run = workflow_runs.find(r => r.name === name);
                        if (!run) {
                            core.notice(`"${name}" has not completed yet for ${sha} — skipping deploy until all checks finish`);
                            core.setOutput('ready', 'false');
                            return;
                        }
                        if (run.conclusion !== 'success') {
                            core.setFailed(`"${name}" did not pass for ${sha}`);
                            return;
                        }
                    }
                    core.setOutput('ready', 'true');

            - name: Deploy to EC2
              if: steps.gate.outputs.ready == 'true'
              uses: appleboy/ssh-action@v1.2.0
              with:
                host: ${{secrets.ODDJOBS_HOST}}
                username: ${{secrets.ODDJOBS_USER}}
                key: ${{secrets.ODDJOBS_SSH_KEY}}
                script: |
                    set -e

                    cd ~/oddjobs || git clone https://github.com/${{ github.repository }}.git ~/oddjobs && cd ~/oddjobs
                    git fetch origin main
                    git reset --hard origin/main

                    if ! command -v docker >/dev/null 2>&1; then
                        curl -fsSL https://get.docker.com | sh
                        sudo usermod -aG docker $USER || true
                    fi

                    cat > ~/oddjobs/.env <<ENVEOF
                    POSTGRES_USER=${{ secrets.POSTGRES_USER }}
                    POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
                    POSTGRES_DB=${{ secrets.POSTGRES_DB }}
                    ENVEOF

                    sudo docker compose down --remove-orphans
                    sudo docker compose build
                    sudo docker compose up -d --remove-orphans
                    