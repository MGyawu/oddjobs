name: Deploy

on:
    workflow_run:
        workflows: ["Tests", "Semgrep Scan", "Trivy Scan"]
        types: [completed]
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        if: ${{github.event.workflow_run.conclusion == 'success'}}

        steps:
            - name: Verify all workflows passed
              uses: actions/github-script@v7
              with:
                script: |
                    const sha = context.payload.workflow_run.head_sha;
                    const required = ['Tests', 'Semgrep Scan', 'Trivy Scan'];

                    for(const name of required){
                        const runs = await github.rest.actions.listWorkflowRunsForRepo({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            head_sha: sha,
                            status: 'completed'
                        });
                        if(!runs.data.workflow_runs.find(r => r.name === name && r.conclusion === 'success')){
                            core.setFailed(`"${name}" has not passed for ${sha}`);
                            return;
                        }
                    }
            - name: Deploy to EC2
              uses: appleboy/ssh-action@v1.2.0
              with:
                host: ${{secrets.ODDJOBS_HOST}}
                username: ${{secrets.ODDJOBS_USER}}
                key: ${{secrets.ODDJOBS_SSH_KEY}}
                script: |
                    set -e

                    cd ~/oddjobs || git clone https://github.com/${{ github.repository }}.git ~/oddjobs && cd ~/oddjobs
                    git fetch origin main
                    git reset --hard origin/main

                    if ! command -v docker >/dev/null 2>&1; then
                        curl -fsSL https://get.docker.com | sh
                        sudo usermod -aG docker $USER || true
                    fi

                    sudo docker compose down
                    sudo docker compose build
                    sudo docker compose up -d
                    