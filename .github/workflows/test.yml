name: Tests

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    docker-tests:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Build Containers
            run: docker compose build

          - name: Run Backend Tests
            run: docker compose run --rm --no-deps backend pytest

          - name: Run Frontend Tests
            run: docker compose run --rm --no-deps frontend npm test -- --watchAll=false